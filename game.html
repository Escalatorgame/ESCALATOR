<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESCALATOR GAME</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    min-height:100vh;
    background:#000;
}

/* Container */

.container{
    position:relative;
    width:100%;
}

/* Full Image */

.game-image{
    width:100%;
    height:auto;
    display:block;
}

/* Invisible Back Button */

.back-button{
    position:absolute;

    top:0;
    left:0;

    width:120px;
    height:120px;

    z-index:999;

    background:transparent;
}

</style>
</head>
<body>

<div class="container">

    <img
    src="D8728183-072B-4BB8-A853-A6999E916A6C.png"
    class="game-image"
    alt="ESCALATOR GAME">

    <!-- Back to Home -->
    <a href="index.html" class="back-button"></a>

</div>

</body>
</html>
