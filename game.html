<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESCALATOR GAME</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#121212;
    color:white;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* Header */

.header{
    text-align:center;
    padding:15px;
    font-size:28px;
    font-weight:bold;
    color:#d4af37;
    background:#1a1a1a;
}

/* Game Area */

.game-area{
    flex:1;
    position:relative;
    overflow:hidden;
    background:#181818;
}

/* Grid Background */

.grid{
    position:absolute;
    width:100%;
    height:100%;

    background-image:
    linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);

    background-size:40px 40px;
}

/* Multiplier */

.multiplier{
    position:absolute;
    top:35%;
    width:100%;
    text-align:center;

    font-size:70px;
    font-weight:bold;
    color:#ffd700;

    z-index:5;
}

/* Train */

.train{
    position:absolute;

    left:20px;
    bottom:120px;

    font-size:70px;

    animation: moveTrain 12s linear infinite;
}

@keyframes moveTrain{

    0%{
        left:20px;
        bottom:120px;
    }

    100%{
        left:85%;
        bottom:70%;
    }

}

/* Controls */

.controls{
    background:#1a1a1a;
    padding:15px;
}

.bet-input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin-bottom:10px;
    font-size:18px;
}

.bet-btn,
.cashout-btn{

    width:100%;
    padding:15px;

    border:none;
    border-radius:10px;

    font-size:20px;
    font-weight:bold;

    cursor:pointer;
}

.bet-btn{
    background:#d4af37;
    color:black;
    margin-bottom:10px;
}

.cashout-btn{
    background:#28a745;
    color:white;
}

</style>
</head>
<body>

<div class="header">
ESCALATOR
</div>

<div class="game-area">

    <div class="grid"></div>

    <div
    class="multiplier"
    id="multiplier">
    1.00x
    </div>

    <div class="train">
        🚆
    </div>

</div>

<div class="controls">

    <input
    class="bet-input"
    type="number"
    placeholder="Enter Bet Amount">

    <button
    class="bet-btn">
    PLACE BET
    </button>

    <button
    class="cashout-btn">
    CASH OUT
    </button>

</div>

<script>

let multiplier = 1.00;

setInterval(()=>{

    multiplier += 0.01;

    document
    .getElementById("multiplier")
    .innerText =
    multiplier.toFixed(2)+"x";

},100);

</script>

</body>
</html>
