<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESCALATOR GAME</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    min-height:100vh;

    background-image:url('photo-output.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    flex-direction:column;

    color:white;
}

/* Dark overlay */

body::before{

    content:"";
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.45);

    z-index:-1;
}

/* GAME BOX */

.game-box{

    width:95%;
    max-width:900px;

    height:320px;

    margin:20px auto;

    border-radius:20px;

    overflow:hidden;

    position:relative;

    border:2px solid rgba(255,255,255,.1);

    background:
    radial-gradient(circle at center,
    rgba(40,140,220,.8),
    rgba(0,0,0,.95));

}

/* Rays */

.game-box::before{

    content:"";

    position:absolute;
    inset:0;

    background:
    repeating-conic-gradient(
    from 180deg,
    rgba(255,255,255,.04) 0deg,
    rgba(255,255,255,.04) 8deg,
    transparent 8deg,
    transparent 16deg);

}

/* Multiplier */

.multiplier{

    position:absolute;

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%);

    font-size:90px;

    font-weight:bold;

    z-index:5;
}

/* Controls */

.controls{

    width:95%;
    max-width:900px;

    margin:auto auto 20px;

    background:rgba(15,15,15,.95);

    border-radius:20px;

    padding:20px;

    border:1px solid rgba(255,255,255,.08);
}

.bet-tabs{

    display:flex;

    margin-bottom:15px;

    overflow:hidden;

    border-radius:12px;

    background:#111;
}

.bet-tabs button{

    flex:1;

    padding:15px;

    border:none;

    background:none;

    color:white;

    font-size:20px;
}

.bet-tabs .active{

    background:#222;

    color:#d4af37;
}

.bet-row{

    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.bet-row input{

    flex:1;

    padding:15px;

    border:none;

    border-radius:10px;

    font-size:24px;

    text-align:center;
}

.bet-button{

    width:100%;

    padding:25px;

    border:none;

    border-radius:15px;

    background:#16b000;

    color:white;

    font-size:38px;

    cursor:pointer;
}

.bet-button span{

    display:block;
    font-size:20px;
}

</style>
</head>
<body>

<div class="game-box">

    <div
    class="multiplier"
    id="multiplier">
    1.00x
    </div>

</div>

<div class="controls">

    <div class="bet-tabs">

        <button class="active">
        Bet
        </button>

        <button>
        Auto
        </button>

    </div>

    <div class="bet-row">

        <input
        type="number"
        value="50.00">

    </div>

    <button class="bet-button">

        Bet

        <span>
        50.00 NGN
        </span>

    </button>

</div>

<script>

let multiplier = 1.00;

setInterval(()=>{

    multiplier += 0.01;

    document
    .getElementById("multiplier")
    .innerText =
    multiplier.toFixed(2)+"x";

},100);

</script>

</body>
</html>
