<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESCALATOR GAME</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

.container{
    position:relative;
    width:100%;
    height:100vh;
}

.game-image{
    width:100%;
    height:100vh;
    object-fit:contain;
    display:block;
}

/* Invisible back button */
.back-button{
    position:absolute;
    top:5%;
    left:1%;
    width:80px;
    height:80px;
    z-index:100;
}

</style>
</head>
<body>

<div class="container">

    <img
    src="IMG_0286.jpeg"
    class="game-image"
    alt="ESCALATOR GAME">

    <a href="index.html" class="back-button"></a>

</div>

</body>
</html>
