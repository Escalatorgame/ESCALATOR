<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESCALATOR GAME</title>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
}

.container{
    position:relative;
    width:100%;
}

.game-image{
    width:100%;
    height:auto;
    display:block;
}

/* Back button */
.back-button{
    position:absolute;
    top:0;
    left:0;
    width:120px;
    height:120px;
    z-index:100;
}

/* Multiplier */
.multiplier{
    position:absolute;
    top:60%;
    left:23%;
    transform:translate(-50%, -50%);
    color:white;
    font-size:42px;
    font-weight:bold;
    text-align:center;
    text-shadow:0 0 20px #00aaff;
    width:250px;
    z-index:100;
}

/* Train crash emoji - shifted UP */
.train-crash{
    position:absolute;
    top:31%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:70px;
    display:none;
    z-index:100;
}

/* Bet text centered inside green box */
.bet-title{
    position:absolute;
    bottom:16%;
    left:53%;
    transform:translateX(-50%);
    color:white;
    font-size:18px;
    font-weight:bold;
    z-index:100;
}

/* 50.00 NGN centered under Bet */
.bet-ngn{
    position:absolute;
    bottom:11%;
    left:53%;
    transform:translateX(-50%);
    color:white;
    font-size:16px;
    font-weight:bold;
    z-index:100;
}

/* Amount between - and + shifted upward */
.amount{
    position:absolute;
    bottom:11.5%;
    left:18%;
    transform:translateX(-50%);
    color:white;
    font-size:18px;
    font-weight:bold;
    z-index:100;
}

/* Minus button */
.minus{
    position:absolute;
    bottom:5%;
    left:5%;
    width:50px;
    height:50px;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:100;
}

/* Plus button */
.plus{
    position:absolute;
    bottom:5%;
    left:25%;
    width:50px;
    height:50px;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:100;
}
</style>
</head>
<body>
<div class="container">
<!-- Multiplier -->
<div class="multiplier" id="multiplier">
1.00x
</div>
<!-- Train crash -->
<div class="train-crash" id="trainCrash">
🚂💥
</div>
<!-- Bet display -->
<div class="bet-title">
Bet
</div>
<div class="bet-ngn" id="betNGN">
50.00 NGN
</div>
<!-- Amount between - and + -->
<div class="amount" id="amount">
50.00
</div>
<!-- Minus & Plus -->
<!-- Quick buttons -->
<!-- Bet area -->
</div>
<script>

let bet = 50;
let multiplier = 1;
let running = false;
let timer;
let crashPoint = 1;


// Update all bet displays
function updateBet(){

    document.getElementById("amount").innerText =
    bet.toFixed(2);

    document.getElementById("betNGN").innerText =
    bet.toFixed(2) + " NGN";

}

bet += 50;
updateBet();

if(bet > 50){

    bet -= 50;
    updateBet();

}

bet = 100;
updateBet();

bet = 200;
updateBet();

bet = 500;
updateBet();

bet = 1000;
updateBet();

let chance = Math.random();


// 74.12% Low odds
if(chance < 0.7412){

    return 1 + Math.random() * 0.79;

}


// 19% Medium odds
else if(chance < 0.9312){

    return 2 + Math.random() * 6.99;

}


// 5% High odds
else if(chance < 0.9812){

    return 9 + Math.random() * 26.99;

}


// 1.88% Jackpot odds
else{

    return 36 + Math.random() * 64;

}

if(running) return;


running = true;

multiplier = 1;

crashPoint = generateCrashPoint();


let display =
document.getElementById("multiplier");


let train =
document.getElementById("trainCrash");


// Reset multiplier
display.style.color = "white";

display.style.textShadow =
"0 0 20px #00aaff";

display.innerHTML = "1.00x";


// Hide train crash
train.style.display = "none";


timer = setInterval(function(){

    multiplier += 0.01;


    display.innerHTML =
    multiplier.toFixed(2) + "x";


    // Train accident
    if(multiplier >= crashPoint){

        clearInterval(timer);

        running = false;


        // Turn current multiplier red
        display.style.color = "red";

        display.style.textShadow =
        "0 0 25px red";


        // Show 🚂💥 immediately
        train.style.display = "block";


        // Keep accident display for 6 seconds
        setTimeout(function(){

            train.style.display = "none";


            // Start next automatic round
            startGame();


        },6000);

    }

},100);

updateBet();

startGame();
</script>
</body>
</html>
