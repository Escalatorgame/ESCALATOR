<script>

let bet = 50;
let multiplier = 1;
let running = false;
let timer;
let crashPoint = 1;


// Update amount display
function updateAmount(){
    document.getElementById("amount").innerText =
    bet.toFixed(2);
}


// Quick bet controls
document.getElementById("b100").onclick = function(){
    bet = 100;
    updateAmount();
};

document.getElementById("b200").onclick = function(){
    bet = 200;
    updateAmount();
};

document.getElementById("b500").onclick = function(){
    bet = 500;
    updateAmount();
};

document.getElementById("b1000").onclick = function(){
    bet = 1000;
    updateAmount();
};


// ESCALATOR crash odds generator
function generateCrashPoint(){

    let chance = Math.random();

    // 74.12% Low odds (1.00x - 1.79x)
    if(chance < 0.7412){
        return 1 + Math.random() * 0.79;
    }

    // 19% Medium odds (2.00x - 8.99x)
    else if(chance < 0.9312){
        return 2 + Math.random() * 6.99;
    }

    // 5% High odds (9.00x - 35.99x)
    else if(chance < 0.9812){
        return 9 + Math.random() * 26.99;
    }

    // 1.88% Jackpot (36.00x - 100.00x)
    else{
        return 36 + Math.random() * 64;
    }

}


// Start the game round
function startGame(){

    if(running){
        return;
    }

    running = true;
    multiplier = 1.00;

    // Generate a new random crash point
    crashPoint = generateCrashPoint();

    document.getElementById("multiplier").innerText =
    "1.00x";


    timer = setInterval(function(){

        multiplier += 0.01;

        document.getElementById("multiplier").innerText =
        multiplier.toFixed(2) + "x";


        // Check if the train crashes
        if(multiplier >= crashPoint){

            clearInterval(timer);

            document.getElementById("multiplier").innerText =
            "💥 CRASH";

            running = false;


            // Reset after 3 seconds
            setTimeout(function(){

                document.getElementById("multiplier").innerText =
                "1.00x";

            },3000);

        }

    },100);

}

</script>
