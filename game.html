<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESCALATOR GAME</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
}

.container{
    position:relative;
    width:100%;
}

.game-image{
    width:100%;
    height:auto;
    display:block;
}

/* Back button */
.back-button{
    position:absolute;
    top:0;
    left:0;
    width:120px;
    height:120px;
    z-index:100;
}

/* Multiplier box - shifted down */
.multiplier{
    position:absolute;
    top:58%;
    left:23%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:42px;
    font-weight:bold;
    text-align:center;
    text-shadow:0 0 20px #00aaff;
    z-index:100;
    width:250px;
}

/* Train accident text */
.accident-title{
    display:block;
    color:white;
    font-size:16px;
    letter-spacing:2px;
    margin-bottom:8px;
}

/* Red crash multiplier */
.crash-number{
    color:red;
    font-size:60px;
    text-shadow:0 0 20px red;
}


/* Amount display removed */
.amount{
    display:none;
}


/* Quick amount buttons */
.quick{
    position:absolute;
    width:80px;
    height:50px;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:100;
}

#b100{
    bottom:10%;
    left:4%;
}

#b200{
    bottom:10%;
    left:16%;
}

#b500{
    bottom:4%;
    left:4%;
}

#b1000{
    bottom:4%;
    left:16%;
}


/* Bet button */
.bet-button{
    position:absolute;
    bottom:7%;
    right:12%;
    width:38%;
    height:16%;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:100;
}

</style>

</head>

<body>

<div class="container">

<img 
src="B81F7178-6C17-46A2-BD23-353DB83C9F67.png"
class="game-image">

<a href="index.html" class="back-button"></a>


<!-- Multiplier Display -->
<div class="multiplier" id="multiplier">
1.00x
</div>


<!-- Hidden amount -->
<div class="amount" id="amount">
50.00
</div>


<!-- Quick amount buttons -->
<button class="quick" id="b100"></button>
<button class="quick" id="b200"></button>
<button class="quick" id="b500"></button>
<button class="quick" id="b1000"></button>


<!-- Bet area -->
<button class="bet-button"></button>


</div>


<script>

let bet = 50;
let multiplier = 1;
let running = false;
let timer;
let crashPoint = 1;


// Quick amount buttons
document.getElementById("b100").onclick = function(){
    bet = 100;
};

document.getElementById("b200").onclick = function(){
    bet = 200;
};

document.getElementById("b500").onclick = function(){
    bet = 500;
};

document.getElementById("b1000").onclick = function(){
    bet = 1000;
};


// ESCALATOR crash generator
function generateCrashPoint(){

let chance = Math.random();

    // 74.12% Low (1.00x - 1.79x)
    if(chance < 0.7412){
        return 1 + Math.random() * 0.79;
    }

    // 19% Medium (2.00x - 8.99x)
    else if(chance < 0.9312){
        return 2 + Math.random() * 6.99;
    }

    // 5% High (9.00x - 35.99x)
    else if(chance < 0.9812){
        return 9 + Math.random() * 26.99;
    }

    // 1.88% Jackpot (36x - 100x)
    else{
        return 36 + Math.random() * 64;
    }

}


// Start automatic game
function startGame(){

    if(running) return;

    running = true;

    multiplier = 1;

    crashPoint = generateCrashPoint();

    document.getElementById("multiplier").style.color = "white";
    document.getElementById("multiplier").style.textShadow = "0 0 20px #00aaff";
    document.getElementById("multiplier").innerHTML =
    "1.00x";


    timer = setInterval(function(){

        multiplier += 0.01;

        document.getElementById("multiplier").innerHTML =
        multiplier.toFixed(2) + "x";


        // Train accident
        if(multiplier >= crashPoint){

            clearInterval(timer);

            running = false;


            // Show red accident screen for 6 seconds
            document.getElementById("multiplier").innerHTML =
            "<span class='accident-title'>TRAIN ACCIDENT</span>" +
            "<span class='crash-number'>" +
            multiplier.toFixed(2) +
            "x</span>";


            setTimeout(function(){

                // Show train crash icon
                document.getElementById("multiplier").style.color = "red";
                document.getElementById("multiplier").style.textShadow =
                "0 0 20px red";

                document.getElementById("multiplier").innerHTML =
                "🚂💥";


                // Wait 3 seconds then start a new round
                setTimeout(function(){

                    startGame();

                },3000);


            },6000);

        }

    },100);

}


// Start automatically when player opens the page
window.onload = function(){

    startGame();

};

</script>

</body>
</html>
