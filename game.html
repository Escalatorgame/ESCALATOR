<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESCALATOR GAME</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
}

.container{
    position:relative;
    width:100%;
}

.game-image{
    width:100%;
    height:auto;
    display:block;
}

/* Back button */
.back-button{
    position:absolute;
    top:0;
    left:0;
    width:120px;
    height:120px;
    z-index:100;
}

/* Multiplier */
.multiplier{
    position:absolute;
    top:60%;
    left:23%;
    transform:translate(-50%, -50%);
    color:white;
    font-size:42px;
    font-weight:bold;
    text-align:center;
    text-shadow:0 0 20px #00aaff;
    width:250px;
    z-index:100;
}

/* Train crash emoji - keep same */
.train-crash{
    position:absolute;
    top:31%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:70px;
    display:none;
    z-index:100;
}

/* Bet text - slightly bigger and moved down */
.bet-title{
    position:absolute;
    bottom:15.5%;
    left:50%;
    color:white;
    font-size:28px;
    font-weight:bold;
    z-index:100;
}

/* 50.00 NGN - much bigger and shifted far right */
.bet-ngn{
    position:absolute;
    bottom:12%;
    left:42%;
    color:white;
    font-size:20px;
    font-weight:bold;
    z-index:100;
}

/* Amount between - and + moved upward */

.amount{
    position:absolute;
    bottom:19.7%;
    left:14.6%;   /* shifted slightly to the left */
    color:white;
    font-size:16px;
    font-weight:bold;
    z-index:100;
}

/* Invisible Minus button */
.minus{
    position:absolute;
    bottom:19.5%;
    left:5.5%;
    width:23px;
    height:23px;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:200;
}

/* Invisible Plus button */
.plus{
    position:absolute;
    bottom:19.5%;
    left:29%;
    width:23px;
    height:23px;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:200;
}

/* Quick amount buttons */
.quick{
    position:absolute;
    width:80px;
    height:50px;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:100;
}

#b100{
    bottom:10%;
    left:4%;
}

#b200{
    bottom:10%;
    left:16%;
}

#b500{
    bottom:4%;
    left:4%;
}

#b1000{
    bottom:4%;
    left:16%;
}


/* Bet button */
.bet-button{
    position:absolute;
    bottom:7%;
    right:12%;
    width:38%;
    height:16%;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:100;
}

</style>

</head>

<body>

<div class="container">

<img
src="2E1DE6F2-CAA9-4B77-977D-58FEC0968696.png"
class="game-image">

<a href="index.html" class="back-button"></a>


<!-- Multiplier -->
<div class="multiplier" id="multiplier">
1.00x
</div>


<!-- Train crash -->
<div class="train-crash" id="trainCrash">
🚂💥
</div>


<!-- Bet display -->
<div class="bet-title">
Bet
</div>


<div class="bet-ngn" id="betNGN">
50.00 NGN
</div>


<!-- Amount between - and + -->
<div class="amount" id="amount">
50.00
</div>


<!-- Minus & Plus -->

<button class="minus" id="minus"></button>

<button class="plus" id="plus"></button>

<!-- Quick buttons -->
<button class="quick" id="b100"></button>

<button class="quick" id="b200"></button>

<button class="quick" id="b500"></button>

<button class="quick" id="b1000"></button>


<!-- Bet area -->
<button class="bet-button"></button>


</div>

<script>

let bet = 50;
let multiplier = 1;
let running = false;
let timer;
let crashPoint = 1;


// Update all bet displays
function updateBet(){

    document.getElementById("amount").innerText =
    bet.toFixed(2);

    document.getElementById("betNGN").innerText =
    bet.toFixed(2) + " NGN";

}


// Plus button
document.getElementById("plus").onclick = function(){

    bet += 30;
    updateBet();

};


// Minus button
document.getElementById("minus").onclick = function(){

    if(bet > 50){

        bet -= 50;

        updateBet();

    }

};

// Quick buttons
document.getElementById("b100").onclick = function(){

    bet = 100;
    updateBet();

};


document.getElementById("b200").onclick = function(){

    bet = 200;
    updateBet();

};


document.getElementById("b500").onclick = function(){

    bet = 500;
    updateBet();

};


document.getElementById("b1000").onclick = function(){

    bet = 1000;
    updateBet();

};


// ESCALATOR crash odds
function generateCrashPoint(){

    let chance = Math.random();


    // 74.12% Low odds
    if(chance < 0.7412){

        return 1 + Math.random() * 0.79;

    }


    // 19% Medium odds
    else if(chance < 0.9312){

        return 2 + Math.random() * 6.99;

    }


    // 5% High odds
    else if(chance < 0.9812){

        return 9 + Math.random() * 26.99;

    }


    // 1.88% Jackpot odds
    else{

        return 36 + Math.random() * 64;

    }

}


// Automatic game rounds
function startGame(){

    if(running) return;


    running = true;

    multiplier = 1;

    crashPoint = generateCrashPoint();


    let display =
    document.getElementById("multiplier");


    let train =
    document.getElementById("trainCrash");


    // Reset multiplier
    display.style.color = "white";

    display.style.textShadow =
    "0 0 20px #00aaff";

    display.innerHTML = "1.00x";


    // Hide train crash
    train.style.display = "none";


    timer = setInterval(function(){


        multiplier += 0.01;


        display.innerHTML =
        multiplier.toFixed(2) + "x";


        // Train accident
        if(multiplier >= crashPoint){


            clearInterval(timer);


            running = false;


            // Turn current multiplier red
            display.style.color = "red";

            display.style.textShadow =
            "0 0 25px red";


            // Show 🚂💥 immediately
            train.style.display = "block";


            // Keep accident display for 6 seconds
            setTimeout(function(){


                train.style.display = "none";


                // Start next automatic round
                startGame();


            }, 6000);


        }


    },100);

}


// Start game automatically when page opens
window.onload = function(){

    updateBet();

    startGame();

};

</script>


</body>

</html>
