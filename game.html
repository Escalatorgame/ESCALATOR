<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESCALATOR GAME</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
}

.container{
    position:relative;
    width:100%;
}

.game-image{
    width:100%;
    height:auto;
    display:block;
}

/* Back button */
.back-button{
    position:absolute;
    top:0;
    left:0;
    width:120px;
    height:120px;
    z-index:100;
}


/* Normal multiplier - shifted down */
.multiplier{
    position:absolute;
    top:60%;
    left:23%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:42px;
    font-weight:bold;
    text-align:center;
    text-shadow:0 0 20px #00aaff;
    z-index:100;
    width:250px;
}


/* Train crash emoji in middle of screen */
.train-crash{
    position:absolute;
    top:42%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:70px;
    z-index:100;
    display:none;
}


/* Hidden amount */
.amount{
    display:none;
}


/* Quick amount buttons */
.quick{
    position:absolute;
    width:80px;
    height:50px;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:100;
}

#b100{
    bottom:10%;
    left:4%;
}

#b200{
    bottom:10%;
    left:16%;
}

#b500{
    bottom:4%;
    left:4%;
}

#b1000{
    bottom:4%;
    left:16%;
}


/* Bet button */
.bet-button{
    position:absolute;
    bottom:7%;
    right:12%;
    width:38%;
    height:16%;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:100;
}

</style>

</head>

<body>

<div class="container">

<img 
src="2E1DE6F2-CAA9-4B77-977D-58FEC0968696.png"
class="game-image">


<a href="index.html" class="back-button"></a>


<!-- Multiplier -->
<div class="multiplier" id="multiplier">
1.00x
</div>


<!-- Train crash icon -->
<div class="train-crash" id="trainCrash">
🚂💥
</div>


<!-- Hidden amount -->
<div class="amount" id="amount">
50.00
</div>


<button class="quick" id="b100"></button>
<button class="quick" id="b200"></button>
<button class="quick" id="b500"></button>
<button class="quick" id="b1000"></button>


<button class="bet-button"></button>


</div>


<script>

let bet = 50;
let multiplier = 1;
let running = false;
let timer;
let crashPoint = 1;


// Quick amount buttons

document.getElementById("b100").onclick = function(){
    bet = 100;
};

document.getElementById("b200").onclick = function(){
    bet = 200;
};

document.getElementById("b500").onclick = function(){
    bet = 500;
};

document.getElementById("b1000").onclick = function(){
    bet = 1000;
};


// Crash odds generator

function generateCrashPoint(){

let chance = Math.random();


if(chance < 0.7412){
    return 1 + Math.random() * 0.79;
}

else if(chance < 0.9312){
    return 2 + Math.random() * 6.99;
}

else if(chance < 0.9812){
    return 9 + Math.random() * 26.99;
}

else{
    return 36 + Math.random() * 64;
}

}

// Start automatic ESCALATOR game

function startGame(){

    if(running) return;

    running = true;

    multiplier = 1;

    crashPoint = generateCrashPoint();


    // Reset multiplier style
    let display = document.getElementById("multiplier");

    display.style.color = "white";
    display.style.textShadow = "0 0 20px #00aaff";

    display.innerHTML = "1.00x";


    // Hide train crash emoji
    document.getElementById("trainCrash").style.display = "none";


    timer = setInterval(function(){

        multiplier += 0.01;


        display.innerHTML =
        multiplier.toFixed(2) + "x";


        // When train crashes
        if(multiplier >= crashPoint){

            clearInterval(timer);

            running = false;


            // Same multiplier turns red
            display.style.color = "red";
            display.style.textShadow = "0 0 25px red";


            // Keep red multiplier visible for 6 seconds
            setTimeout(function(){


                // Hide multiplier and show train crash
                display.innerHTML = "";

                document.getElementById("trainCrash").style.display =
                "block";


                // Show 🚂💥 for 3 seconds
                setTimeout(function(){


                    document.getElementById("trainCrash").style.display =
                    "none";


                    // Start another round automatically
                    startGame();


                },3000);


            },6000);


        }


    },100);


}


// Automatically start game when page opens

window.onload = function(){

    startGame();

};

</script>

</body>

</html>
