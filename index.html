<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESCALATOR</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <!-- Background Image -->
        <img
            src="assets/escalator-bg.png"
            alt="Escalator Background"
            class="background"
        >

        <!-- Moving Train -->
        <img
            src="assets/train.png"
            alt="Train"
            id="train"
        >

        <!-- Play Button -->
        <button
            class="play-btn"
            onclick="startGame()"
        >
            PLAY
        </button>

    </div>

    <script src="js/script.js"></script>

</body>
</html>
