<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESCALATOR</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial, sans-serif;
}

.container{
    position:relative;
    width:100%;
    height:100vh;

    background-image:url('D78BC78F-4911-4795-8DB1-C2C3F2214310.png');
    background-repeat:no-repeat;

    /* Moves image upward */
    background-position:center -50px;

    /* Keeps entire image visible */
    background-size:contain;

    background-color:#000;
}

/* Invisible clickable area over PLAY button */
.play-link{
    position:absolute;

    left:50%;
    top:58%;

    width:260px;
    height:90px;

    transform:translateX(-50%);

    z-index:100;
}

</style>
</head>
<body>

<div class="container">

    <!-- Clickable PLAY area -->
    <a href="game.html" class="play-link"></a>

</div>

</body>
</html>
